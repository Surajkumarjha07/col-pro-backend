name: First CI Pipeline

on:
    push:
        branches: [dev]

jobs:
    build:
        runs-on: ubuntu-22.04
        steps:
            - uses: actions/checkout@v4
            - run: npm ci
            - run: docker build -t first-pipeline .
            - run: docker push ${{secrets.DOCKER_USERNAME}}/first-pipeline
            - run: docker run first-pipeline